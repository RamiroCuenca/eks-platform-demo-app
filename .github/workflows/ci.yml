name: ci

on:
  push:
    branches: [main]
  pull_request:

# Least privilege by default; jobs opt in to exactly what they need.
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: build & test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "gofmt found unformatted files:"; echo "$unformatted"; exit 1
          fi
      - name: vet
        run: go vet ./...
      - name: test
        run: go test -race ./...
      - name: build
        run: go build ./...

  image-scan:
    name: container image scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: build image
        run: docker build -t demo-app:${{ github.sha }} .
      - name: trivy scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: demo-app:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # Runs only on merges to main, and only after the build/test and scan gates
  # pass. Pull requests never reach this job and never hold a cloud identity:
  # the CI role's OIDC trust policy is pinned to ref:refs/heads/main, so a
  # token minted for a PR cannot even assume it.
  publish:
    name: publish image
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [test, image-scan]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC token exchange with AWS -- no static keys exist anywhere
    env:
      AWS_REGION: ap-northeast-1
      IMAGE: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-1.amazonaws.com/eks-platform/demo-app:${{ github.sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: authenticate to AWS
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/eks-platform-ci-app
          aws-region: ${{ env.AWS_REGION }}
      - name: log in to ECR
        run: |
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${AWS_REGION}.amazonaws.com"
      # One immutable tag per merge: the full commit SHA. The registry rejects
      # any attempt to repoint an existing tag, so the tag promoted into the
      # gitops repo is provably this build. Multi-arch (amd64 + arm64) because
      # the cluster's node pools are Graviton-first with an amd64 fallback;
      # the Dockerfile cross-compiles, so no QEMU setup is required.
      # --provenance=false keeps the pushed artifact a plain OCI image index
      # instead of attaching attestation manifests that surface as confusing
      # untagged entries in ECR.
      - name: build and push (linux/amd64, linux/arm64)
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --tag "$IMAGE" \
            --provenance=false \
            --push .

  # Promotion: move the gitops repo's pinned image tag to the artifact just
  # published. Deliberately a pull request, not a direct push -- the gitops
  # main branch is protected, and the promotion should pass the same
  # validation gates (kubeconform, helm, semgrep, gitleaks) as any human
  # change. Auto-merge lands it once they're green; ArgoCD reconciles main.
  # Auth is a fine-grained PAT (GITOPS_TOKEN: Contents + Pull requests on the
  # gitops repo only) -- GITHUB_TOKEN cannot cross repositories.
  promote:
    name: promote image tag to gitops
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [publish]
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: checkout gitops repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: RamiroCuenca/eks-platform-gitops
          token: ${{ secrets.GITOPS_TOKEN }}
      - name: point the go-demo chart at the new tag
        run: |
          sed -i -E "s|^(  tag: )\"[0-9a-f]{40}\"|\\1\"${GITHUB_SHA}\"|" workloads/go-demo/values.yaml
          # sed exits 0 even when nothing matched -- verify the tag actually landed.
          grep -q "tag: \"${GITHUB_SHA}\"" workloads/go-demo/values.yaml
      - name: open auto-merged promotion PR
        env:
          GH_TOKEN: ${{ secrets.GITOPS_TOKEN }}
        run: |
          if git diff --quiet; then
            echo "tag already current; nothing to promote"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="promote/${GITHUB_SHA}"
          git checkout -b "$BRANCH"
          git commit -am "chore: promote demo-app image ${GITHUB_SHA:0:12}"
          git push origin "$BRANCH"
          gh pr create --repo RamiroCuenca/eks-platform-gitops --base main --head "$BRANCH" \
            --title "chore: promote demo-app image ${GITHUB_SHA:0:12}" \
            --body "Automated promotion from RamiroCuenca/eks-platform-demo-app@${GITHUB_SHA}. The tag is immutable in ECR, so this pins exactly the artifact that passed the build, test, and container-scan gates. Merges automatically once this repository's validation checks pass."
          gh pr merge --repo RamiroCuenca/eks-platform-gitops "$BRANCH" --auto --squash --delete-branch
