name: ci

on:
  push:
    branches: [main]
  pull_request:

# Least privilege by default; jobs opt in to exactly what they need.
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: build & test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "gofmt found unformatted files:"; echo "$unformatted"; exit 1
          fi
      - name: vet
        run: go vet ./...
      - name: test
        run: go test -race ./...
      - name: build
        run: go build ./...

  image-scan:
    name: container image scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: build image
        run: docker build -t demo-app:${{ github.sha }} .
      - name: trivy scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: demo-app:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

# NOTE: ECR push + gitops image-tag promotion land in a follow-up once the infra repo
# creates the private ECR repository and the app's CI OIDC role. They add a job gated on
# `github.ref == 'refs/heads/main' && github.event_name == 'push'` that assumes the role via
# OIDC, pushes the image, then commits the new tag into the eks-platform-gitops repo.
